<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタッフログイン</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'ヒラギノ角ゴ Pro W3', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top left, #91d7ff 0%, transparent 35%),
                        radial-gradient(circle at bottom right, #7cd1a3 0%, transparent 28%),
                        #edf2f7;
            color: #333;
            padding: 20px;
        }
        
        .login-container {
            background-color: #ffffff;
            padding: 40px 32px;
            border-radius: 20px;
            box-shadow: 0 18px 45px rgba(35, 55, 90, 0.12);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(15, 52, 80, 0.08);
        }
        
        .login-container h2 {
            margin: 0 0 8px;
            font-size: 1.7rem;
            letter-spacing: 0.02em;
            text-align: center;
            color: #16325c;
            font-weight: 700;
        }
        
        .subtitle {
            margin: 0 0 28px;
            font-size: 0.95rem;
            color: #5a6b83;
            text-align: center;
            line-height: 1.5;
        }
        
        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        
        input {
            width: 100%;
            padding: 14px 14px;
            border: 1.5px solid #d8dee7;
            border-radius: 12px;
            background-color: #fafbfe;
            transition: all 0.3s ease;
            font-size: 0.97rem;
            color: #293149;
            height: 48px;
            flex-shrink: 0;
        }
        
        input::placeholder {
            color: #a0aec0;
        }
        
        input:focus {
            outline: none;
            border-color: #5d95ff;
            box-shadow: 0 0 0 4px rgba(93, 149, 255, 0.12);
            background-color: #ffffff;
        }
        
        button {
            width: 100%;
            padding: 14px 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, #3d8bff 0%, #2f6ad0 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 20px rgba(49, 100, 215, 0.18);
            height: 48px;
        }
        
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 26px rgba(49, 100, 215, 0.22);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .error {
            color: #d64545;
            text-align: center;
            margin-top: 16px;
            font-size: 0.95rem;
            padding: 12px 14px;
            background-color: #fed7d7;
            border-radius: 8px;
            border-left: 4px solid #d64545;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 28px 20px;
            }
            
            .login-container h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>スタッフログイン</h2>
        <p class="subtitle">スタッフアカウントで安全にログインしてください。</p>
        
        <div class="form-group">
            <input type="text" id="staffId" placeholder="スタッフID" value="admin" required>
        </div>
        
        <div class="form-group">
            <input type="password" id="password" placeholder="パスワード" value="password" required>
        </div>
        
        <button onclick="login()">ログイン</button>
        <div id="error" class="error"></div>
    </div>

    <script>
        document.getElementById('staffId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        function login() {
            const staffId = document.getElementById('staffId').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            if (staffId === 'admin' && password === 'password') {
                window.location.href = 'STAFF_main.html';
            } else {
                errorDiv.textContent = 'IDまたはパスワードが間違っています。';
                errorDiv.classList.add('show');
            }
        }
    </script>
</body>
</html>
