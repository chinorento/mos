<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>注文履歴 - みどり亭</title>
  <link rel="stylesheet" href="../Customer/order_history.css">
</head>
<body>
  <header class="app-header" role="banner">
    <div class="header-inner">
      <div class="header-left">
        <h1 id="storeName">みどり亭 ○○店</h1>
        <div class="status" role="status" aria-live="polite">
          <label for="staffSeatSelect" style="font-size: 14px; font-weight: bold; margin-right: 4px;">座席:</label>
          <select id="staffSeatSelect" style="padding: 4px; border-radius: 4px; font-size: 14px; background: white; color: #333;" aria-label="現在の座席">
            <option value="">選択してください</option>
            <option value="A-01">A-01</option>
            <option value="A-02">A-02</option>
            <option value="B-01">B-01</option>
            <option value="B-02">B-02</option>
            <option value="C-01">C-01</option>
            <option value="C-02">C-02</option>
            <option value="C-03">C-03</option>
          </select>
          <span id="loLabel" aria-label="ラストオーダーまでの時間" style="margin-left: 10px;">ラストオーダーまで：計算中...</span>
        </div>
      </div>
      <div class="header-right">
        <a href="STAFF_main.html" class="top-link" aria-label="トップへ">TOPへ</a>
        <time id="currentTime" class="current-time" aria-live="polite">--:--:--</time>
      </div>
    </div>
  </header>

  <main class="container" role="main">
    <section class="controls">
      <div class="counts">
        配膳済み: <strong id="deliveredCount">0</strong> 点 /
        未配膳: <strong id="pendingCount">0</strong> 点
      </div>
      <div class="filters" role="tablist" aria-label="注文フィルタ">
        <button class="filter-btn active" data-filter="all" type="button">全て</button>
        <button class="filter-btn" data-filter="pending" type="button">未配膳</button>
        <button class="filter-btn" data-filter="delivered" type="button">配膳済み</button>
        <button id="clearHistory" class="secondary" type="button">履歴を削除</button>
      </div>
    </section>

    <section id="ordersList" class="orders-list" aria-live="polite">
      <!-- 注文エントリがここに入る -->
    </section>
  </main>

  <!-- トースト（top_menu.js の showToast と互換） -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="../Customer/shared-state.js"></script>
  <script src="../Customer/api.js"></script>
  <script src="../Customer/order_history.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const seatSelect = document.getElementById('staffSeatSelect');
      const currentSeat = localStorage.getItem('seatId');
      
      if (currentSeat) {
        const option = Array.from(seatSelect.options).find(opt => opt.value === currentSeat);
        if (option) {
          option.selected = true;
        } else {
          seatSelect.appendChild(new Option(currentSeat, currentSeat, true, true));
        }
      }

      seatSelect.addEventListener('change', (e) => {
        const newSeat = e.target.value;
        if (newSeat) {
          localStorage.setItem('seatId', newSeat);
          if (typeof AppState !== 'undefined') AppState.setSeatId(newSeat);
          window.location.reload(); // 座席に紐づく履歴などを再ロード
        }
      });
    });
  </script>
</body>
</html>
