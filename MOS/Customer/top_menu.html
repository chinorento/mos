<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="みどり亭 居酒屋POS注文システム - 座席管理、メニュー注文、スタッフ呼び出し"
    />
    <meta name="theme-color" content="#ff7f32" />
    <title>みどり亭｜トップメニュー</title>
    <link rel="stylesheet" href="top_menu.css" />
  </head>
  <body>
    <!-- 初期化用スクリプト（QR判定してリダイレクト） -->
    <script>
      // QRスキャン済みかチェック（座席が設定されていない場合はQR画面へ）
      if (!localStorage.getItem("seatId")) {
        window.location.href = "qr_entry.html";
      }
    </script>
    <!-- メインヘッダー：店舗情報・座席・時刻表示 -->
    <header class="app-header" role="banner">
      <div class="header-inner">
        <div class="header-left">
          <h1 id="storeName">みどり亭 本店</h1>
          <div class="status" role="status" aria-live="polite">
            <span id="seatLabel" aria-label="現在の座席">席：未設定</span>
            <span id="loLabel" aria-label="ラストオーダーまでの時間"
              >ラストオーダーまで：計算中...</span
            >
          </div>
        </div>
        <div class="header-right">
          <time
            id="currentTime"
            class="current-time"
            aria-live="polite"
            role="timer"
            aria-label="現在時刻"
          >
            --:--:--
          </time>
        </div>
      </div>
    </header>

    <!-- メインナビゲーション -->
    <main class="container" role="main">
      <nav class="grid" role="navigation" aria-label="メインメニュー">
        <a class="card" href="menu_list.html" aria-describedby="menu-desc">
          <div class="card__icon" aria-hidden="true"></div>
          <h2 class="card__title">メニュー一覧</h2>
          <p class="card__desc" id="menu-desc">
            取り皿・おしぼりなどもこちらから
          </p>
        </a>

        <a
          class="card"
          href="order_history.html"
          aria-describedby="history-desc"
        >
          <div class="card__icon" aria-hidden="true">📋</div>
          <h2 class="card__title">注文履歴</h2>
          <p class="card__desc" id="history-desc">
            ご注文の履歴・配膳状況を確認
          </p>
        </a>


      <button class="card" id="btnCall" type="button" 
        aria-describedby="call-desc">
        <div class="card__icon" aria-hidden="true">🔔</div>
        <h2 class="card__title">スタッフ呼び出し</h2>
        <p class="card__desc" id="call-desc">
        スタッフを呼び出します
        </p>
      </button>

        <a class="card" href="checkout.html">
          <div class="card__icon" aria-hidden="true">💳</div>
          <h2 class="card__title">お会計</h2>
          <p class="card__desc" id="checkout-desc">
            お支払い手続きへ進みます
          </p>
        </a>

      </nav>
    </main>

    <!-- トースト通知 -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- 呼び出し完了モーダル -->
    <div id="callResultModal" class="modal" hidden aria-hidden="true" inert>
      <div class="modal__backdrop"></div>
      <div
        class="modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="callResultTitle"
      >
        <h3 id="callResultTitle">呼び出し完了</h3>
        <p id="callResultMessage">スタッフを呼び出しました</p>
        <div class="modal__actions">
          <button id="closeCallResult" class="primary" type="button">
            閉じる
          </button>
          <button id="retryCall" class="secondary" type="button" hidden>
            再試行
          </button>
        </div>
      </div>
    </div>

    <!-- 呼び出し確認モーダル -->
    <div id="callModal" class="modal" hidden aria-hidden="true" inert>
      <div class="modal__backdrop"></div>
      <div
        class="modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="callModalTitle"
      >
        <h3 id="callModalTitle">スタッフ呼び出しの確認</h3>
        <p>呼び出したらスタッフに通知されます。呼び出しますか？</p>
        <div class="modal__actions">
          <button id="confirmCall" class="primary" type="button">
            呼び出す
          </button>
          <button id="cancelCall" class="secondary" type="button">
            閉じる
          </button>
        </div>
      </div>
    </div>

    <!-- 座席選択モーダル -->
    <div id="seatModal" class="modal" hidden aria-hidden="true" inert>
      <div class="modal__backdrop"></div>
      <div
        class="modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="seatModalTitle"
      >
        <h3 id="seatModalTitle">座席を選択</h3>
        <p>ご利用になる座席を選択してください</p>
        <label for="seatSelect" class="form-label">座席選択</label>
        <select
          id="seatSelect"
          class="form-select"
          aria-required="true"
        ></select>
        <div class="modal__actions">
          <button id="confirmSeat" class="primary" type="button">設定</button>
          <button id="cancelSeat" class="secondary" type="button">閉じる</button>
        </div>
      </div>
    </div>

    <!-- 会計準備中モーダル -->
    <div id="paymentPreparingModal" class="modal" hidden aria-hidden="true" inert>
      <div class="modal__backdrop"></div>
      <div
        class="modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="paymentTitle"
      >
        <h3 id="paymentTitle">会計処理中</h3>
        <p>お会計を準備しています...</p>
        <div style="text-align: center; margin: 20px 0">
          <div style="font-size: 48px; animation: pulse 2s infinite">💳</div>
          <div style="margin-top: 12px; font-size: 14px; color: #666">
            処理中です。しばらくお待ちください。
          </div>
        </div>
      </div>
    </div>

    <footer class="app-footer" role="contentinfo">
      <small>&copy; 2026 みどり亭 MOS システム</small>
    </footer>

    <style>
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
      }
    </style>

    <script src="shared-state.js"></script>
    <script src="api.js"></script>
    <script>
      function focusOutsideModal(modal) {
        const target = document.querySelector('main') || document.body;
        if (target === document.body && !target.hasAttribute('tabindex')) {
          target.setAttribute('tabindex', '-1');
          target.focus({ preventScroll: true });
          target.removeAttribute('tabindex');
          return;
        }
        if (typeof target.focus === 'function') {
          target.focus({ preventScroll: true });
        }
      }

      function openModal(modal) {
        if (!modal) return;
        if ('inert' in modal) modal.inert = false;
        modal.hidden = false;
        modal.setAttribute('aria-hidden', 'false');
        const focusTarget = modal.querySelector('button, input, select, textarea, [tabindex]:not([tabindex="-1"])');
        if (focusTarget && typeof focusTarget.focus === 'function') {
          focusTarget.focus();
        }
      }

      function closeModal(modal) {
        if (!modal) return;
        const activeElement = document.activeElement;
        if (activeElement && modal.contains(activeElement) && typeof activeElement.blur === 'function') {
          activeElement.blur();
        }
        focusOutsideModal(modal);
        if ('inert' in modal) modal.inert = true;
        modal.hidden = true;
        modal.setAttribute('aria-hidden', 'true');
      }

      async function saveStaffCallToDb(call) {
        const endpoint = '/MOS/Customer/insert_staffcall.php';
        const datetime = new Date(call.createdAt);
        const formattedDatetime = Number.isNaN(datetime.getTime())
          ? new Date().toISOString().slice(0, 19).replace('T', ' ')
          : datetime.toISOString().slice(0, 19).replace('T', ' ');

        const payload = new URLSearchParams({
          id: call.id,
          seat_no: call.seatId,
          datetime: formattedDatetime,
          complete_flag: '0',
        });

        try {
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: payload,
            credentials: 'same-origin',
            cache: 'no-store',
          });

          const responseText = await response.text();
          let data = null;

          try {
            data = responseText ? JSON.parse(responseText) : null;
          } catch (parseError) {
            throw new Error(responseText || `HTTP ${response.status}`);
          }

          if (!response.ok || !data || !data.success) {
            throw new Error(data?.error || responseText || `HTTP ${response.status}`);
          }

          return data;
        } catch (error) {
          if (navigator.sendBeacon) {
            const beaconSent = navigator.sendBeacon(endpoint, payload);
            if (beaconSent) {
              return { success: true, message: 'スタッフ呼び出しを送信しました' };
            }
          }

          throw error;
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        const btnCall = document.getElementById("btnCall");
        const callModal = document.getElementById("callModal");
        const confirmCallBtn = document.getElementById("confirmCall");
        const cancelCallBtn = document.getElementById("cancelCall");
        const callResultModal = document.getElementById("callResultModal");
        const closeCallResultBtn = document.getElementById("closeCallResult");

        // 呼び出し確認モーダルを開く
        if (btnCall) {
          btnCall.addEventListener("click", () => {
            openModal(callModal);
          });
        }

        // 1. 呼び出すボタンの処理
        confirmCallBtn.addEventListener("click", async () => {
          const seatId = (window.AppState && AppState.seatId) || localStorage.getItem("seatId") || "未設定";
          const newCall = {
            id: "call_" + Date.now(),
            seatId: seatId,
            status: "pending",
            createdAt: new Date().toISOString(),
            reason: "お客様からの呼び出し"
          };

          try {
            await saveStaffCallToDb(newCall);

            // ローカルにも残しておく（DB保存の補助）
            const calls = JSON.parse(localStorage.getItem("staffCalls") || "[]");
            calls.unshift(newCall);
            localStorage.setItem("staffCalls", JSON.stringify(calls));

            closeModal(callModal);
            openModal(callResultModal);
          } catch (error) {
            console.error('スタッフ呼び出し保存失敗:', error);
            alert('スタッフ呼び出しの保存に失敗しました。');
          }
        });

        // 2. キャンセルボタン（閉じる）の処理
        cancelCallBtn.addEventListener("click", () => {
          closeModal(callModal);
        });

        // 3. 完了モーダルを閉じる
        closeCallResultBtn.addEventListener("click", () => {
          closeModal(callResultModal);
        });
      });
    </script>
  </body>
</html>
